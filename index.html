<!DOCTYPE html>
<html>
<body>

<h2>نظرسنجی</h2>

<form onsubmit="send(event)">
<input id="name" placeholder="نام"><br><br>
<input id="phone" placeholder="شماره"><br><br>
<button>ارسال</button>
</form>

<script>
function send(e){
 e.preventDefault();

 fetch("/submit", {
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body: JSON.stringify({
     name: document.getElementById("name").value,
     phone: document.getElementById("phone").value
   })
 });

 alert("ارسال شد");
}
</script>

</body>
</html>
